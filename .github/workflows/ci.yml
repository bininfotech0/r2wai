name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: '10.0'

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore src/R2WAI.slnx

      - name: Build
        run: dotnet build src/R2WAI.slnx -c Release --no-restore

      - name: Test
        run: dotnet test src/R2WAI.slnx -c Release --no-build --verbosity normal

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t r2wai-api:ci .

      - name: Build Blazor web image
        run: docker build -f docker/Dockerfile.web -t r2wai-web:ci .
