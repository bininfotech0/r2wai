apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: r2wai-api-policy
  namespace: r2wai
  labels:
    app: r2wai
spec:
  podSelector:
    matchLabels:
      app: r2wai
      component: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: r2wai
              component: web
        - podSelector:
            matchLabels:
              component: ingress
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: r2wai
              component: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: r2wai
              component: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: r2wai
              component: qdrant
      ports:
        - protocol: TCP
          port: 6333
        - protocol: TCP
          port: 6334
    - to:
        - podSelector:
            matchLabels:
              app: r2wai
              component: minio
      ports:
        - protocol: TCP
          port: 9000
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow external HTTPS (AI providers, webhooks)
    - to: []
      ports:
        - protocol: TCP
          port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: r2wai-db-policy
  namespace: r2wai
  labels:
    app: r2wai
spec:
  podSelector:
    matchLabels:
      app: r2wai
      component: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: r2wai
              component: api
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
