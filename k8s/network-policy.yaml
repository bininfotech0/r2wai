---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: r2wai-web-policy
  namespace: r2wai
  labels:
    app: r2wai
spec:
  podSelector:
    matchLabels:
      app: r2wai
      component: web
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              component: ingress
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: r2wai
              component: api
      ports:
        - protocol: TCP
          port: 8080
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
