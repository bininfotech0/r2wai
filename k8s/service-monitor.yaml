apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: r2wai-api-monitor
  namespace: r2wai
  labels:
    app: r2wai
    component: monitoring
spec:
  selector:
    matchLabels:
      app: r2wai
      component: api
  endpoints:
    - port: http
      path: /api/v1/operations/metrics/prometheus
      interval: 30s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - r2wai
