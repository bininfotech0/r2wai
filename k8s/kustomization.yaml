apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: r2wai
  labels:
    app: r2wai

namespace: r2wai

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - postgres-deployment.yaml
  - redis-deployment.yaml
  - qdrant-deployment.yaml
  - minio-deployment.yaml
  - api-deployment.yaml
  - web-deployment.yaml
  - ingress.yaml
  - hpa-api.yaml
  - pdb-api.yaml
  - network-policy.yaml

commonLabels:
  app: r2wai
  environment: production
  managed-by: kustomize

images:
  - name: ghcr.io/r2wai/r2wai-api
    newName: ghcr.io/r2wai/r2wai-api
    newTag: latest
  - name: ghcr.io/r2wai/r2wai-web
    newName: ghcr.io/r2wai/r2wai-web
    newTag: latest
