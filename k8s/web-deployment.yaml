apiVersion: v1
kind: Service
metadata:
  name: r2wai-web
  namespace: r2wai
  labels:
    app: r2wai
    component: web
spec:
  ports:
    - port: 8080
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: r2wai
    component: web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: r2wai-web
  namespace: r2wai
  labels:
    app: r2wai
    component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: r2wai
      component: web
  template:
    metadata:
      labels:
        app: r2wai
        component: web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
        - name: web
          image: ghcr.io/r2wai/r2wai-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
