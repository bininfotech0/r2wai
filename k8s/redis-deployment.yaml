apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: r2wai
  labels:
    app: r2wai
    component: redis
spec:
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  clusterIP: None
  selector:
    app: r2wai
    component: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: r2wai
  labels:
    app: r2wai
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: r2wai
      component: redis
  template:
    metadata:
      labels:
        app: r2wai
        component: redis
    spec:
      securityContext:
        runAsUser: 999
        runAsNonRoot: true
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          args:
            - --save
            - "60"
            - "1"
            - --appendonly
            - "yes"
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 2Gi
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: r2wai
  labels:
    app: r2wai
    component: redis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
  storageClassName: standard
