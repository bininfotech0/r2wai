apiVersion: v1
kind: Secret
metadata:
  name: r2wai-secrets
  namespace: r2wai
  labels:
    app: r2wai
    component: secrets
  annotations:
    description: >-
      IMPORTANT: Do NOT commit real secrets to this file.
      Use 'kubectl create secret' or an external secrets manager
      (Sealed Secrets, External Secrets Operator, HashiCorp Vault).
      The values below are placeholders that MUST be replaced before deployment.
type: Opaque
stringData:
  # Replace with actual values via: kubectl create secret generic r2wai-secrets --from-literal=...
  # Or use external-secrets-operator / sealed-secrets in production.
  ConnectionStrings__DefaultConnection: "REPLACE_VIA_EXTERNAL_SECRET_MANAGER"
  Storage__MinIO__AccessKey: "REPLACE_VIA_EXTERNAL_SECRET_MANAGER"
  Storage__MinIO__SecretKey: "REPLACE_VIA_EXTERNAL_SECRET_MANAGER"
  POSTGRES_PASSWORD: "REPLACE_VIA_EXTERNAL_SECRET_MANAGER"
  Jwt__Key: "REPLACE_VIA_EXTERNAL_SECRET_MANAGER"
  Jwt__Issuer: r2wai-api
  Jwt__Audience: r2wai-client
