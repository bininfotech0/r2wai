apiVersion: v1
kind: Secret
metadata:
  name: r2wai-secrets
  namespace: r2wai
  labels:
    app: r2wai
    component: secrets
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: Host=postgres;Database=r2wai;Username=r2wai;Password=r2wai_secret
  Storage__MinIO__AccessKey: minioadmin
  Storage__MinIO__SecretKey: minioadmin
  POSTGRES_PASSWORD: r2wai_secret
  Jwt__Key: change-me-in-production-use-a-256-bit-key
  Jwt__Issuer: r2wai-api
  Jwt__Audience: r2wai-client
