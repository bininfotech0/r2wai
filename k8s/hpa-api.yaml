apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: r2wai-api
  namespace: r2wai
  labels:
    app: r2wai
    component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: r2wai-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
